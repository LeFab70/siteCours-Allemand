<!-- Bouton flottant -->
<button
  (click)="basculer()"
  class="fixed bottom-6 right-6 z-[60] w-16 h-16 rounded-full bg-gradient-to-br from-brand-navy to-brand-blue-light text-white shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-transform"
  [class.pulse-ring]="!ouvert()"
  aria-label="Ouvrir le chat"
>
  @if (!ouvert()) {
    <span class="text-3xl">🤖</span>
    @if (nonLu()) {
      <span class="absolute -top-1 -right-1 w-5 h-5 bg-brand-orange text-white text-xs font-bold rounded-full flex items-center justify-center animate-bounce">1</span>
    }
  } @else {
    <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  }
</button>

<!-- Fenêtre de chat -->
@if (ouvert()) {
  <div
    class="fixed bottom-24 right-6 z-[60] w-[92vw] max-w-sm rounded-3xl bg-white shadow-2xl overflow-hidden flex flex-col animate-[zoom-in_0.25s_ease] origin-bottom-right"
    style="height: min(72vh, 560px)"
  >
    <!-- En-tête -->
    <div class="animated-gradient text-white p-4 flex items-center gap-3">
      <div class="relative w-11 h-11 rounded-full bg-white/20 flex items-center justify-center text-2xl">
        🤖
        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-white"></span>
      </div>
      <div class="leading-tight">
        <div class="font-bold">Lingua • Assistant IA</div>
        <div class="text-xs text-white/80">En ligne — réponse immédiate</div>
      </div>
    </div>

    <!-- Messages -->
    <div #zone class="flex-1 overflow-y-auto p-4 space-y-3 bg-brand-cream">
      @for (m of messages(); track $index) {
        <div class="flex" [class.justify-end]="m.from === 'user'">
          <div
            class="max-w-[80%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed shadow-sm"
            [class]="m.from === 'user'
              ? 'bg-brand-orange text-white rounded-br-md'
              : 'bg-white text-gray-700 rounded-bl-md'"
          >
            {{ m.text }}
          </div>
        </div>
      }

      @if (enTrainEcrire()) {
        <div class="flex">
          <div class="bg-white px-4 py-3 rounded-2xl rounded-bl-md shadow-sm flex gap-1">
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
          </div>
        </div>
      }
    </div>

    <!-- Suggestions rapides -->
    <div class="px-3 pt-2 flex flex-wrap gap-2 bg-white">
      @for (s of suggestions; track s) {
        <button
          (click)="utiliserSuggestion(s)"
          class="text-xs font-semibold text-brand-navy bg-brand-cream hover:bg-brand-orange/10 px-3 py-1.5 rounded-full transition"
        >
          {{ s }}
        </button>
      }
    </div>

    <!-- Saisie -->
    <form (ngSubmit)="envoyer()" class="p-3 bg-white flex items-center gap-2">
      <input
        [ngModel]="saisie()"
        (ngModelChange)="saisie.set($event)"
        name="saisie"
        type="text"
        placeholder="Écrivez votre message..."
        autocomplete="off"
        class="flex-1 rounded-full bg-brand-cream px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-orange/30"
      />
      <button
        type="submit"
        [disabled]="!saisie().trim()"
        class="w-10 h-10 shrink-0 rounded-full bg-brand-orange text-white flex items-center justify-center hover:bg-brand-orange-light disabled:opacity-40 transition"
        aria-label="Envoyer"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" /></svg>
      </button>
    </form>
  </div>
}
